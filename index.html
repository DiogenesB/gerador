<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Essence — Gerador</title>
<style>
:root{--gold:#e8c070;--goldD:#b8893a;--gl:#1a3d28;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:#0c0c0c;color:#f0e8d8;min-height:100vh;display:flex}
.sidebar{width:370px;min-width:320px;background:#111;border-right:1px solid rgba(184,137,58,0.18);padding:1.5rem 1.4rem;overflow-y:auto;height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:1.4rem;padding-bottom:1.1rem;border-bottom:1px solid rgba(184,137,58,0.18)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--goldD)}
.brand-name{font-size:14px;letter-spacing:.12em;color:var(--gold);font-weight:bold}
.brand-sub{font-size:10px;color:rgba(232,192,112,0.4);letter-spacing:.08em}
.tabs{display:flex;gap:6px;margin-bottom:1.2rem}
.tab{flex:1;padding:8px;border:1px solid rgba(184,137,58,0.22);border-radius:6px;background:transparent;color:rgba(240,232,216,0.45);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:Georgia,serif;transition:all .2s}
.tab.active{background:rgba(184,137,58,0.15);border-color:var(--goldD);color:var(--gold)}
.panel{display:none}.panel.active{display:block}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,232,216,0.38);margin-bottom:4px;font-family:Arial,sans-serif}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(184,137,58,0.2);border-radius:6px;padding:8px 10px;color:#f0e8d8;font-size:13px;font-family:Georgia,serif;outline:none;transition:border-color .2s;resize:vertical}
.field textarea{min-height:65px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--goldD)}
.field select option{background:#1a1a1a}
.field input::placeholder,.field textarea::placeholder{color:rgba(240,232,216,0.2)}
.upload-area{border:1px dashed rgba(184,137,58,0.3);border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.02)}
.upload-area:hover,.upload-area.has{border-color:var(--goldD);border-style:solid}
.upload-area p{font-size:12px;color:rgba(240,232,216,0.35);margin-top:4px;font-family:Arial,sans-serif}
.upload-area .fname{color:var(--gold);font-size:11px;margin-top:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,232,216,0.3);margin:12px 0 7px;border-top:1px solid rgba(184,137,58,0.1);padding-top:10px;font-family:Arial,sans-serif}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(184,137,58,0.22);background:rgba(255,255,255,0.03);color:rgba(240,232,216,0.55);transition:all .15s;user-select:none;font-family:Arial,sans-serif}
.chip.active{background:rgba(184,137,58,0.16);border-color:var(--goldD);color:var(--gold)}
.btn-gerar{width:100%;padding:12px;background:linear-gradient(135deg,var(--gl),#0a1c14);border:1px solid rgba(184,137,58,0.38);border-radius:7px;color:var(--gold);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-family:Georgia,serif;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-gerar:hover{background:linear-gradient(135deg,#1e4a30,#061410)}
.btn-dl{width:100%;padding:12px;background:var(--goldD);border:none;border-radius:7px;color:#080808;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-family:Georgia,serif;cursor:pointer;margin-top:7px;display:none;font-weight:bold;transition:background .2s}
.btn-dl:hover{background:var(--gold)}
.btn-dl.show{display:block}
.preview-area{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:#080808}
canvas{border-radius:14px;display:block;box-shadow:0 40px 100px rgba(0,0,0,0.85);max-height:92vh;width:auto}
.ph{text-align:center;color:rgba(240,232,216,0.12)}
.ph .big{font-size:52px;margin-bottom:1rem}
.ph p{font-size:14px;letter-spacing:.05em;font-family:Arial,sans-serif}
@media(max-width:680px){body{flex-direction:column}.sidebar{width:100%;height:auto;position:static}.preview-area{padding:1rem}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div><div class="brand-name">INFINITY ESSENCE</div><div class="brand-sub">Gerador de Posts</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('story')">Story</button>
    <button class="tab" onclick="switchTab('ficha')">Ficha Técnica</button>
  </div>

  <div class="field">
    <label>Foto do perfume</label>
    <div class="upload-area" id="uArea" onclick="document.getElementById('fInput').click()">
      <div style="font-size:20px;opacity:.3">↑</div>
      <p id="uTxt">Clique para selecionar</p>
      <div class="fname" id="uName"></div>
    </div>
    <input type="file" id="fInput" accept="image/*" style="display:none" onchange="handleFile(this)">
  </div>

  <div class="panel active" id="panel-story">
    <div class="field"><label>Nome</label><input type="text" id="s-nome" placeholder="Sabah Al Ward"></div>
    <div class="field"><label>Preço (R$)</label><input type="text" id="s-preco" placeholder="199,90"></div>
    <div class="field"><label>CTA</label>
      <select id="s-cta"><option>Peça pelo direct</option><option>Link na bio</option><option>Compre agora</option><option>Últimas unidades</option><option>Encomende já</option></select>
    </div>
    <div class="field"><label>Parcelas</label><input type="text" id="s-parcelas" placeholder="12x de R$19,01"></div>
    <div class="field"><label>Texto central</label><textarea id="s-texto" placeholder="Perfume incrível por esse valor? Aproveita!" style="min-height:52px"></textarea></div>
    <div class="field"><label>Tema</label>
      <select id="s-tema"><option value="foto">Foto Real</option></select>
    </div>
  </div>

  <div class="panel" id="panel-ficha">
    <div class="row2">
      <div class="field"><label>Nome</label><input type="text" id="f-nome" placeholder="Sabah Al Ward"></div>
      <div class="field"><label>Marca</label><input type="text" id="f-marca" placeholder="Al Wataniah"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Categoria</label><input type="text" id="f-cat" placeholder="Feminino"></div>
    </div>
    <div class="sec">Acordes principais (até 10)</div>
    <div class="row2" style="margin-bottom:7px">
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Floral Branco"></div>
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Baunilha"></div>
    </div>
    <div class="row2" style="margin-bottom:7px">
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Doce"></div>
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Cítrico"></div>
    </div>
    <div class="row2" style="margin-bottom:7px">
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Cacau"></div>
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Amadeirado"></div>
    </div>
    <div class="row2" style="margin-bottom:7px">
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Almíscar"></div>
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Âmbar"></div>
    </div>
    <div class="row2">
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Oud"></div>
      <div class="field" style="margin:0"><input class="ac" type="text" placeholder="Especiarias"></div>
    </div>
    <div class="sec">Notas olfativas</div>
    <div class="field"><label>Topo</label><input type="text" id="f-topo" placeholder="Pimenta Rosa, Mandarina"></div>
    <div class="field"><label>Coração</label><input type="text" id="f-coracao" placeholder="Flor de Laranjeira, Jasmim"></div>
    <div class="field"><label>Fundo</label><input type="text" id="f-fundo" placeholder="Baunilha, Fava Tonka, Patchouli"></div>
    <div class="sec">Perfil</div>
    <div class="row2">
      <div class="field"><label>Longevidade</label>
        <select id="f-long"><option>2-3h Moderada</option><option>4-5h Boa</option><option selected>6-8h Longa</option><option>8h+ Excepcional</option></select>
      </div>
      <div class="field"><label>Projeção</label>
        <select id="f-proj"><option>Suave</option><option>Moderada</option><option selected>Forte</option><option>Bestial</option></select>
      </div>
    </div>
    <div class="sec">Uso ideal</div>
    <div class="chips" id="usoC">
      <span class="chip active" data-v="Dia">Dia</span><span class="chip" data-v="Noite">Noite</span>
      <span class="chip" data-v="Trabalho">Trabalho</span><span class="chip" data-v="Casual">Casual</span>
      <span class="chip" data-v="Festas">Festas</span><span class="chip" data-v="Romântico">Romântico</span>
    </div>
    <div class="sec">Estações</div>
    <div class="chips" id="estaC">
      <span class="chip active" data-v="Primavera">Primavera</span>
      <span class="chip active" data-v="Verão">Verão</span>
      <span class="chip" data-v="Outono">Outono</span>
      <span class="chip" data-v="Inverno">Inverno</span>
    </div>
    <div class="field" style="margin-top:12px"><label>Tema</label>
      <select id="f-tema"><option value="cream">Creme claro</option><option value="dark">Verde escuro</option><option value="black">Preto elegante</option></select>
    </div>
  </div>

  <button class="btn-gerar" id="btnG" onclick="gerar()">✦ Gerar</button>
  <button class="btn-dl" id="btnDl" onclick="baixar()">↓ Baixar PNG</button>
</div>

<div class="preview-area">
  <div class="ph" id="ph"><div class="big">◈</div><p>Preencha os dados ao lado</p></div>
  <canvas id="cv" width="1080" height="1920" style="display:none"></canvas>
</div>

let perfImg=null, finalURL=null, currentTab='story';

document.querySelectorAll('.chips').forEach(g=>g.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('active'))));

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['story','ficha'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('btnDl').classList.remove('show');
}

// Remoção de fundo — flood fill multi-pass com suavização de borda
function removeBg(src){
  return new Promise(res=>{
    const W=src.naturalWidth||src.width, H=src.naturalHeight||src.height;
    const off=document.createElement('canvas');
    off.width=W; off.height=H;
    const oc=off.getContext('2d');
    oc.drawImage(src,0,0);
    const id=oc.getImageData(0,0,W,H), d=id.data;

    // 1. Amostrar cor de fundo com mediana de muitos pontos da borda
    const samples=[];
    const step4=Math.max(1,Math.floor(Math.min(W,H)/40));
    for(let x=0;x<W;x+=step4){
      samples.push([x,0],[x,1],[x,2],[x,H-1],[x,H-2],[x,H-3]);
    }
    for(let y=0;y<H;y+=step4){
      samples.push([0,y],[1,y],[2,y],[W-1,y],[W-2,y],[W-3,y]);
    }
    const rs=[],gs=[],bs=[];
    samples.forEach(([x,y])=>{
      if(x<0||x>=W||y<0||y>=H)return;
      const i=(y*W+x)*4;
      rs.push(d[i]);gs.push(d[i+1]);bs.push(d[i+2]);
    });
    rs.sort((a,b)=>a-b);gs.sort((a,b)=>a-b);bs.sort((a,b)=>a-b);
    const mid=Math.floor(rs.length/2);
    const bgR=rs[mid],bgG=gs[mid],bgB=bs[mid];
    const bgBright=(bgR+bgG+bgB)/3;
    const isDarkBg=bgBright<80;

    // Tolerância adaptativa: fundo escuro precisa de threshold menor
    const THR=isDarkBg?38:55;

    function colorDist(r,g,b){
      return Math.sqrt((r-bgR)**2+(g-bgG)**2+(b-bgB)**2);
    }

    // 2. BFS flood fill a partir de toda a borda externa
    const isBg=new Uint8Array(W*H);
    const visited=new Uint8Array(W*H);
    // Usar array simples como fila circular para performance
    const qx=new Int16Array(W*H);
    const qy=new Int16Array(W*H);
    let qHead=0,qTail=0;

    function tryEnqueue(x,y){
      if(x<0||x>=W||y<0||y>=H)return;
      const idx=y*W+x;
      if(visited[idx])return;
      visited[idx]=1;
      const pi=idx*4;
      if(colorDist(d[pi],d[pi+1],d[pi+2])<THR){
        isBg[idx]=1;
        qx[qTail]=x;qy[qTail]=y;qTail++;
      }
    }

    // Semear toda a borda
    for(let x=0;x<W;x++){tryEnqueue(x,0);tryEnqueue(x,H-1);}
    for(let y=1;y<H-1;y++){tryEnqueue(0,y);tryEnqueue(W-1,y);}

    // Propagar BFS
    while(qHead<qTail){
      const x=qx[qHead],y=qy[qHead];qHead++;
      tryEnqueue(x-1,y);tryEnqueue(x+1,y);
      tryEnqueue(x,y-1);tryEnqueue(x,y+1);
    }

    // 3. Calcular distância de cada pixel ao fundo (para fade de borda)
    // Usamos uma segunda passagem de BFS invertida — distância em pixels
    const dist2=new Uint8Array(W*H);
    const FADE_PX=4; // pixels de suavização
    qHead=0;qTail=0;
    for(let i=0;i<W*H;i++){
      if(isBg[i]){dist2[i]=0;qx[qTail]=i%W;qy[qTail]=Math.floor(i/W);qTail++;}
      else dist2[i]=255;
    }
    // BFS de distância
    while(qHead<qTail){
      const x=qx[qHead],y=qy[qHead];qHead++;
      const cur=dist2[y*W+x];
      if(cur>=FADE_PX)continue;
      const neighbors=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
      for(const [nx,ny] of neighbors){
        if(nx<0||nx>=W||ny<0||ny>=H)continue;
        const nidx=ny*W+nx;
        if(dist2[nidx]>cur+1){
          dist2[nidx]=cur+1;
          qx[qTail]=nx;qy[qTail]=ny;qTail++;
        }
      }
    }

    // 4. Aplicar transparência com anti-aliasing baseado na distância
    for(let i=0;i<W*H;i++){
      const pi=i*4;
      if(isBg[i]){
        d[pi+3]=0;
      } else if(dist2[i]<FADE_PX){
        // Pixel de borda: fade suave
        const t=dist2[i]/FADE_PX; // 0 = junto ao fundo, 1 = longe
        const smoothT=t*t*(3-2*t); // smoothstep
        d[pi+3]=Math.round(d[pi+3]*smoothT);
      }
      // else: pixel interior, mantém alpha
    }

    oc.putImageData(id,0,0);
    const out=new Image();
    out.onload=()=>res(out);
    out.src=off.toDataURL('image/png');
  });
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function corner(ctx,x,y,dx,dy,sz,c,lw){
  ctx.save();ctx.strokeStyle=c;ctx.lineWidth=lw||4;ctx.lineCap='square';
  ctx.beginPath();ctx.moveTo(x,y+dy*sz);ctx.lineTo(x,y);ctx.lineTo(x+dx*sz,y);
  ctx.stroke();ctx.restore();
}

function fitFont(ctx,t,mw,ms,mn,tpl){
  let s=ms;
  while(s>=mn){ctx.font=tpl.replace('%%',s);if(ctx.measureText(t).width<=mw)break;s-=2;}
  return s;
}

function wrapLines(ctx,txt,maxW){
  const words=txt.split(' ');let line='',lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines;
}

function drawLogo(ctx,logoImg,cx,cy,r,C){
  // Sombra sob o círculo
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.40)';ctx.shadowBlur=32;ctx.shadowOffsetY=10;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=C.logoBg;ctx.fill();
  ctx.restore();

  // Anel dourado externo
  ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);
  ctx.strokeStyle=C.logoStroke;ctx.lineWidth=2.5;ctx.stroke();

  // Clip circular e desenhar logo
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=C.logoBg;ctx.fill();
  if(logoImg){
    // Crop central: remove bordas verdes da logo (usa 80% central)
    const crop=0.80;
    const sw=logoImg.width*crop, sh=logoImg.height*crop;
    const sx=(logoImg.width-sw)/2, sy=(logoImg.height-sh)/2;
    const diam=r*2;
    // Escalar para cobrir o diâmetro exatamente (sem over-zoom)
    const scale=Math.min(diam/sw, diam/sh);
    const dw=sw*scale, dh=sh*scale;
    ctx.drawImage(logoImg, sx, sy, sw, sh, cx-dw/2, cy-dh/2, dw, dh);
  }
  ctx.restore();
}

  cY+=ctaH+22;

  ctx.fillStyle=C.handle;ctx.font='300 26px Georgia,serif';ctx.letterSpacing='0.07em';
  ctx.fillText('@infinityessence',W/2,H-52);ctx.letterSpacing='0px';

  return cv.toDataURL('image/png');
}

async function gerarStoryFoto(nome,slogan,preco,parcelas,textocentro,cta){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=1080,H=1920;
  ctx.clearRect(0,0,W,H);

  const iw=perfImg.naturalWidth, ih=perfImg.naturalHeight;

  // 1. FUNDO — blur por duplo downsample progressivo (sem pixelação nem tremido)
  // Passo 1: reduzir para 25%
  const s1W=270, s1H=480;
  const t1=document.createElement('canvas'); t1.width=s1W; t1.height=s1H;
  const x1=t1.getContext('2d');
  x1.imageSmoothingEnabled=true; x1.imageSmoothingQuality='high';
  const sc1=Math.max(s1W/iw, s1H/ih);
  x1.drawImage(perfImg, Math.round((s1W-iw*sc1)/2), Math.round((s1H-ih*sc1)/2), Math.round(iw*sc1), Math.round(ih*sc1));
  // Passo 2: reduzir para 12%
  const s2W=130, s2H=230;
  const t2=document.createElement('canvas'); t2.width=s2W; t2.height=s2H;
  const x2=t2.getContext('2d');
  x2.imageSmoothingEnabled=true; x2.imageSmoothingQuality='high';
  x2.drawImage(t1, 0,0,s1W,s1H, 0,0,s2W,s2H);
  // Ampliar para o canvas final — o duplo passo elimina pixelação e artefatos
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(t2, 0,0,s2W,s2H, 0,0,W,H);
  ctx.fillStyle='rgba(10,8,20,0.60)';ctx.fillRect(0,0,W,H);

  // 2. LOGO
  const logoImg=await loadImg('data:image/jpeg;base64,'+LOGO_B64);
  drawLogo(ctx,logoImg,W/2,200,148,{logoBg:'#fff',logoStroke:'#c09040',goldD:'#c09040'});

  // 3. CALCULAR CARD primeiro para definir onde a foto termina
  const textoExibir=textocentro||slogan||'';
  ctx.font='400 38px Georgia,serif';
  const lns=textoExibir?wrapLines(ctx,textoExibir,W-200):[];

  const cardMargX=40;
  const cardW=W-cardMargX*2;
  const cardR=28;
  const cardPadTop=72;
  const cardPadBot=64;
  const nomeH=76;
  const linhaH=32;
  const textoH=lns.length>0?(lns.length*56+20):0;
  const precoH=preco?280:0;
  const ctaH=108;
  const cardH=cardPadTop+nomeH+linhaH+textoH+precoH+ctaH+cardPadBot;
  const cardTop=H-cardH-90;
  const cardX=cardMargX;

  // 4. FOTO — ocupa toda a área do logo até o card, com bordas arredondadas
  const fotoTop=390;
  const fotoBottom=cardTop+50; // 50px de sobreposição no card
  const fotoAreaH=fotoBottom-fotoTop;
  const fotoMaxW=W-80;
  const fsc=Math.min(fotoMaxW/iw, fotoAreaH/ih);
  const fdw=Math.round(iw*fsc), fdh=Math.round(ih*fsc);
  const fdx=Math.round((W-fdw)/2);
  const fdy=fotoTop;

  ctx.save();
  rr(ctx,fdx,fdy,fdw,Math.min(fdh,fotoAreaH),20);
  ctx.clip();
  ctx.drawImage(perfImg,fdx,fdy,fdw,Math.min(fdh,fotoAreaH));
  ctx.restore();

  // 5. CARD BRANCO arredondado
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=48;ctx.shadowOffsetY=-6;
  rr(ctx,cardX,cardTop,cardW,cardH,cardR);
  ctx.fillStyle='rgba(253,250,244,0.98)';ctx.fill();
  ctx.restore();

  // 6. CONTEÚDO DO CARD
  let cY=cardTop+cardPadTop;
  ctx.textAlign='center';

  // Nome
  const nFS=fitFont(ctx,nome,cardW-80,76,30,'bold %%px Georgia,serif');
  ctx.font=`bold ${nFS}px Georgia,serif`;
  ctx.fillStyle='#6b3d00';
  ctx.fillText(nome,W/2,cY+56);
  cY+=nomeH;

  // Linha dourada
  ctx.strokeStyle='#c09040';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(cardX+60,cY);ctx.lineTo(cardX+cardW-60,cY);ctx.stroke();
  cY+=linhaH;

  // Texto
  if(lns.length>0){
    ctx.font='400 38px Georgia,serif';ctx.fillStyle='#2a1a08';
    lns.forEach((l,i)=>ctx.fillText(l,W/2,cY+46+i*56));
    cY+=textoH;
  }
  cY+=8;

  // Círculo preço
  if(preco){
    const cr=118, cx=W/2, cy=cY+cr+10;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);
    ctx.fillStyle='rgba(253,250,244,0.98)';ctx.fill();
    ctx.save();ctx.shadowColor='rgba(192,144,64,0.22)';ctx.shadowBlur=12;
    ctx.strokeStyle='#c09040';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    ctx.font='300 21px Arial,sans-serif';ctx.fillStyle='#7a4e00';ctx.letterSpacing='0.08em';
    ctx.fillText('POR APENAS',cx,cy-50);ctx.letterSpacing='0px';
    const pFS=fitFont(ctx,'R$'+preco,cr*1.8,72,30,'bold %%px Georgia,serif');
    ctx.font=`bold ${pFS}px Georgia,serif`;ctx.fillStyle='#b8700a';
    ctx.fillText('R$'+preco,cx,cy+22);
    if(parcelas){ctx.font='400 22px Arial,sans-serif';ctx.fillStyle='#8a5e20';ctx.fillText(parcelas,cx,cy+56);}
    cY+=cr*2+20;
  }
  cY+=8;

  // Botão CTA
  const bW=cardW-80,bH=96,bR=48;
  const bX=cardX+40,bY=cY;
  ctx.save();ctx.shadowColor='rgba(160,100,8,0.35)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
  rr(ctx,bX,bY,bW,bH,bR);ctx.fillStyle='#b8700a';ctx.fill();ctx.restore();
  ctx.fillStyle='#fff';ctx.font='bold 34px Arial,sans-serif';ctx.letterSpacing='0.13em';
  ctx.fillText(cta.toUpperCase(),W/2,bY+64);ctx.letterSpacing='0px';

  // Handle
  ctx.fillStyle='rgba(255,255,255,0.52)';ctx.font='300 26px Georgia,serif';ctx.letterSpacing='0.06em';
  ctx.fillText('@infinityessence',W/2,cardTop+cardH+54);ctx.letterSpacing='0px';

  return cv.toDataURL('image/png');
}

async function gerarFicha(C,nome,marca,cat,vol,acordes,nTopo,nCoracao,nFundo,long,proj,uso,esta){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=1080,H=1920;
  ctx.clearRect(0,0,W,H);

  // Fundo
  const bgG=ctx.createLinearGradient(0,0,W,H);
  bgG.addColorStop(0,C.bg1);bgG.addColorStop(0.55,C.bgMid);bgG.addColorStop(1,C.bg0);
  ctx.fillStyle=bgG;ctx.fillRect(0,0,W,H);
  const gC=ctx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.35,600);
  gC.addColorStop(0,C.goldGlow);gC.addColorStop(1,'transparent');
  ctx.fillStyle=gC;ctx.fillRect(0,0,W,H);

  // Bordas e cantos
  const mg=44;
  ctx.strokeStyle=C.goldD;ctx.lineWidth=2;ctx.strokeRect(mg,mg,W-mg*2,H-mg*2);
  ctx.strokeStyle=C.divLine;ctx.lineWidth=0.5;ctx.strokeRect(mg+14,mg+14,W-mg*2-28,H-mg*2-28);
  const csz=60;
  corner(ctx,mg,mg,1,1,csz,C.goldD,4.5);corner(ctx,W-mg,mg,-1,1,csz,C.goldD,4.5);
  corner(ctx,mg,H-mg,1,-1,csz,C.goldD,4.5);corner(ctx,W-mg,H-mg,-1,-1,csz,C.goldD,4.5);

  // Logo
  const logoImg=await loadImg('data:image/jpeg;base64,'+LOGO_B64);
  drawLogo(ctx,logoImg,W/2,170,90,C);

  // Nome, marca, categoria
  ctx.textAlign='center';
  const nFS=fitFont(ctx,nome,W-140,76,26,'bold %%px Georgia,serif');
  ctx.font=`bold ${nFS}px Georgia,serif`;
  ctx.save();ctx.shadowColor=C.goldGlow.replace('0.2','0.55');ctx.shadowBlur=20;
  ctx.fillStyle=C.gold;ctx.fillText(nome,W/2,332);ctx.restore();
  if(marca){ctx.font='400 30px Georgia,serif';ctx.fillStyle=C.faint;ctx.fillText(marca,W/2,374);}
  if(cat){ctx.font='300 22px Arial,sans-serif';ctx.fillStyle=C.faintest;ctx.letterSpacing='0.16em';ctx.fillText(cat.toUpperCase(),W/2,406);ctx.letterSpacing='0px';}

  // Linha separadora
  ctx.strokeStyle=C.goldD;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(145,432);ctx.lineTo(W-145,432);ctx.stroke();
  [[W/2,3.5],[W/2-26,2.2],[W/2+26,2.2]].forEach(([cx,r])=>{ctx.beginPath();ctx.arc(cx,432,r,0,Math.PI*2);ctx.fillStyle=C.goldD;ctx.fill();});

  // --- LAYOUT PRINCIPAL: foto ESQUERDA, acordes DIREITA ---
  // Calcula altura necessária para acordes
  const numAcordes=Math.min(acordes.length,10);
  const barH=46, barGap=8;
  const acordesAreaH=numAcordes>0 ? 40+numAcordes*(barH+barGap) : 0;
  const imgAreaH=Math.max(560, acordesAreaH+20);

  const cleanImg=await removeBg(perfImg);
  const imgX=55, imgY=448, imgW=420, imgH=imgAreaH;
  const sc=Math.min(imgW/cleanImg.width, imgH/cleanImg.height);
  const dw=cleanImg.width*sc, dh=cleanImg.height*sc;
  const ddx=imgX+(imgW-dw)/2, ddy=imgY+(imgH-dh)/2;

  // Sombra chão
  ctx.save();
  ctx.translate(ddx+dw/2,ddy+dh+8);ctx.scale(1,0.25);
  const shG=ctx.createRadialGradient(0,0,0,0,0,dw*0.46);
  shG.addColorStop(0,'rgba(0,0,0,0.28)');shG.addColorStop(1,'transparent');
  ctx.fillStyle=shG;ctx.beginPath();ctx.arc(0,0,dw*0.46,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.drawImage(cleanImg,ddx,ddy,dw,dh);

  // Acordes — lado direito, alinhado ao topo da foto
  if(numAcordes>0){
    const ax=496, aW=534;
    ctx.textAlign='left';
    ctx.font='300 18px Arial,sans-serif';ctx.fillStyle=C.faintest;ctx.letterSpacing='0.1em';
    ctx.fillText('ACORDES PRINCIPAIS',ax,imgY+24);ctx.letterSpacing='0px';
    ctx.strokeStyle=C.divLine;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(ax,imgY+32);ctx.lineTo(ax+aW,imgY+32);ctx.stroke();

    acordes.slice(0,10).forEach((ac,i)=>{
      const by=imgY+42+i*(barH+barGap);
      const pct=Math.max(0.25, 1-(i*0.08));
      const AC=C.acordeC[i]||C.acordeC[C.acordeC.length-1];
      ctx.save();ctx.shadowColor=AC.s;ctx.shadowBlur=8;
      rr(ctx,ax,by,Math.round(aW*pct),barH,barH/2);
      ctx.fillStyle=AC.f;ctx.fill();
      ctx.strokeStyle=AC.s;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
      ctx.fillStyle=AC.t;ctx.font='500 25px Georgia,serif';
      ctx.fillText(ac,ax+18,by+31);
    });
  }

  // Cards de informação — começam APÓS a zona de imagem/acordes
  let cardY=imgY+imgAreaH+28;

  function drawCard(y,h){
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=18;ctx.shadowOffsetY=5;
    rr(ctx,60,y,W-120,h,16);ctx.fillStyle=C.cardBg;ctx.fill();ctx.restore();
    ctx.strokeStyle=C.cardStroke;ctx.lineWidth=1;rr(ctx,60,y,W-120,h,16);ctx.stroke();
  }

  function cardLabel(label,x,y){
    ctx.font='300 18px Arial,sans-serif';ctx.fillStyle=C.faintest;ctx.letterSpacing='0.1em';
    ctx.fillText(label,x,y);ctx.letterSpacing='0px';
  }

  // Perfil olfativo
  const notaRows=[[nTopo,'\u2191','TOPO'],[nCoracao,'\u2661','CORA\u00c7\u00c3O'],[nFundo,'\u2193','FUNDO']].filter(r=>r[0]);
  if(notaRows.length>0){
    const pfH=44+notaRows.length*62+16;
    drawCard(cardY,pfH);
    ctx.textAlign='left';
    cardLabel('PERFIL OLFATIVO',82,cardY+30);
    ctx.strokeStyle=C.divLine;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(82,cardY+38);ctx.lineTo(W-82,cardY+38);ctx.stroke();
    notaRows.forEach(([val,icon,label],i)=>{
      const ry=cardY+52+i*62;
      ctx.fillStyle=C.goldD;ctx.font='400 24px Georgia,serif';ctx.fillText(icon,82,ry+22);
      ctx.fillStyle=C.goldAcc;ctx.font='bold 15px Arial,sans-serif';ctx.letterSpacing='0.1em';ctx.fillText(label,112,ry+20);ctx.letterSpacing='0px';
      ctx.fillStyle=C.sub;ctx.font='400 25px Georgia,serif';
      ctx.fillText(val.length>60?val.substring(0,58)+'\u2026':val,112,ry+46);
    });
    cardY+=pfH+18;
  }

  // Longevidade + Projeção
  drawCard(cardY,104);
  ctx.textAlign='left';
  ctx.fillStyle=C.goldD;ctx.font='400 26px Georgia,serif';ctx.fillText('\u23f1',84,cardY+54);
  cardLabel('LONGEVIDADE',112,cardY+38);
  ctx.fillStyle=C.sub;ctx.font='bold 30px Georgia,serif';ctx.fillText(long,112,cardY+74);
  ctx.strokeStyle=C.divLine;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2+20,cardY+20);ctx.lineTo(W/2+20,cardY+86);ctx.stroke();
  ctx.fillStyle=C.goldD;ctx.font='400 26px Georgia,serif';ctx.fillText('\u25c9',W/2+42,cardY+54);
  cardLabel('PROJE\u00c7\u00c3O',W/2+72,cardY+38);
  ctx.fillStyle=C.sub;ctx.font='bold 30px Georgia,serif';ctx.fillText(proj,W/2+72,cardY+74);
  cardY+=104+18;

  // Uso ideal
  if(uso.length>0){
    const tagH=40,tagFs=21,tagPad=26;
    ctx.font=`400 ${tagFs}px Georgia,serif`;
    const tws=uso.map(u=>ctx.measureText(u).width+tagPad*2);
    let rows=[[]],ri=0;
    tws.forEach((tw,i)=>{const rw=rows[ri].reduce((s,j)=>s+tws[j]+12,0);if(rw+tw>W-165&&rows[ri].length>0){rows.push([]);ri++;}rows[ri].push(i);});
    const uH=36+rows.length*(tagH+10)+16;
    drawCard(cardY,uH);
    ctx.textAlign='left';cardLabel('USO IDEAL',82,cardY+28);
    rows.forEach((row,ri2)=>{
      let tx=82;
      row.forEach(i=>{
        const u=uso[i];const tw=tws[i];const ty=cardY+40+ri2*(tagH+10);
        rr(ctx,tx,ty,tw,tagH,tagH/2);ctx.fillStyle=C.tagBg;ctx.fill();
        ctx.strokeStyle=C.divLine;ctx.lineWidth=1;ctx.stroke();
        ctx.fillStyle=C.tagText;ctx.textAlign='center';ctx.font=`400 ${tagFs}px Georgia,serif`;
        ctx.fillText(u,tx+tw/2,ty+27);ctx.textAlign='left';tx+=tw+12;
      });
    });
    cardY+=uH+18;
  }

  // Estações
  const allE=['Primavera','Verão','Outono','Inverno'];
  const isDark=C===TS.dark||C===TS.black;
  const eW=(W-160)/4, eH=106;
  drawCard(cardY,eH+46);
  ctx.textAlign='left';cardLabel('ESTA\u00c7\u00d5ES',82,cardY+28);
  allE.forEach((e,i)=>{
    const active=esta.includes(e);
    const ex=60+i*eW, ey=cardY+40, ew=eW-8;
    const ED=ESTA[e];
    rr(ctx,ex,ey,ew,eH,10);
    ctx.fillStyle=active?ED.f:'rgba(128,128,128,0.04)';ctx.fill();
    ctx.strokeStyle=active?ED.s:'rgba(128,128,128,0.12)';ctx.lineWidth=active?1.5:0.75;ctx.stroke();
    ctx.textAlign='center';
    ctx.font='500 28px Georgia,serif';ctx.fillStyle=active?(isDark?ED.tD:ED.tL):'rgba(128,128,128,0.2)';ctx.fillText(ED.icon,ex+ew/2,ey+42);
    ctx.font=`${active?'bold':'300'} 19px Arial,sans-serif`;ctx.fillStyle=active?(isDark?ED.tD:ED.tL):'rgba(128,128,128,0.2)';ctx.fillText(e,ex+ew/2,ey+76);
  });
  cardY+=eH+46+18;

  // Handle final
  ctx.strokeStyle=C.goldD;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(140,H-78);ctx.lineTo(W-140,H-78);ctx.stroke();
  ctx.fillStyle=C.handle;ctx.font='300 25px Arial,sans-serif';ctx.textAlign='center';ctx.letterSpacing='0.08em';
  ctx.fillText('@infinityessence',W/2,H-48);ctx.letterSpacing='0px';

  return cv.toDataURL('image/png');
}


async function gerar(){
  if(!perfImg){alert('Selecione a foto');return;}
  const btn=document.getElementById('btnG');
  btn.textContent='Gerando...';btn.disabled=true;

  const themeKey=document.getElementById(currentTab==='story'?'s-tema':'f-tema').value;
  const C=TS[themeKey];

  if(currentTab==='story'){
    const nome=document.getElementById('s-nome').value.trim()||'Perfume';
    finalURL=await gerarStory(C,nome,
      '',
      '',
      document.getElementById('s-preco').value.trim(),
      '',
      document.getElementById('s-cta').value,
      document.getElementById('s-parcelas').value.trim(),
      document.getElementById('s-texto').value.trim(),
      themeKey);
  } else {
    finalURL=await gerarFicha(C,
      document.getElementById('f-nome').value.trim()||'Perfume',
      document.getElementById('f-marca').value.trim(),
      document.getElementById('f-cat').value.trim(),
      '',
      [...document.querySelectorAll('.ac')].map(i=>i.value.trim()).filter(Boolean),
      document.getElementById('f-topo').value.trim(),
      document.getElementById('f-coracao').value.trim(),
      document.getElementById('f-fundo').value.trim(),
      document.getElementById('f-long').value,
      document.getElementById('f-proj').value,
      [...document.querySelectorAll('#usoC .chip.active')].map(c=>c.dataset.v),
      [...document.querySelectorAll('#estaC .chip.active')].map(c=>c.dataset.v));
  }

  document.getElementById('cv').style.display='block';
  document.getElementById('ph').style.display='none';
  document.getElementById('btnDl').classList.add('show');
  btn.textContent='✦ Gerar';btn.disabled=false;
}

function baixar(){
  if(!finalURL)return;
  const n=(document.getElementById('s-nome').value||document.getElementById('f-nome').value||'ie').trim().replace(/\s+/g,'_');
  const a=document.createElement('a');a.href=finalURL;a.download='IE_'+n+'_'+currentTab+'.png';a.click();
}
